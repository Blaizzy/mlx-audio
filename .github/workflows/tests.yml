name: Tests and Checks

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      shared: ${{ steps.compute.outputs.shared }}
      domains: ${{ steps.compute.outputs.domains }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: filter
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            shared:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'MANIFEST.in'
              - 'pytest.ini'
              - '.pre-commit-config.yaml'
              - '.github/workflows/tests.yml'
              - 'mlx_audio/utils.py'
              - 'mlx_audio/dsp.py'
              - 'mlx_audio/audio_io.py'
              - 'mlx_audio/__init__.py'
              - 'mlx_audio/tests/**'
            stt:
              - 'mlx_audio/stt/**'
            tts:
              - 'mlx_audio/tts/**'
            sts:
              - 'mlx_audio/sts/**'
            codec:
              - 'mlx_audio/codec/**'
            vad:
              - 'mlx_audio/vad/**'
            lid:
              - 'mlx_audio/lid/**'

      - id: compute
        env:
          SHARED: ${{ steps.filter.outputs.shared_any_changed }}
          STT: ${{ steps.filter.outputs.stt_any_changed }}
          TTS: ${{ steps.filter.outputs.tts_any_changed }}
          STS: ${{ steps.filter.outputs.sts_any_changed }}
          CODEC: ${{ steps.filter.outputs.codec_any_changed }}
          VAD: ${{ steps.filter.outputs.vad_any_changed }}
          LID: ${{ steps.filter.outputs.lid_any_changed }}
        run: |
          set -e
          if [ "$SHARED" = "true" ]; then
            domains='["stt","tts","sts","codec","vad","lid"]'
          else
            domains='[]'
            for d in stt tts sts codec vad lid; do
              case "$d" in
                stt)   val="$STT"   ;;
                tts)   val="$TTS"   ;;
                sts)   val="$STS"   ;;
                codec) val="$CODEC" ;;
                vad)   val="$VAD"   ;;
                lid)   val="$LID"   ;;
              esac
              if [ "$val" = "true" ]; then
                domains=$(echo "$domains" | jq -c ". + [\"$d\"]")
              fi
            done
          fi
          echo "shared=${SHARED:-false}" >> "$GITHUB_OUTPUT"
          echo "domains=$domains" >> "$GITHUB_OUTPUT"
          echo "Computed shared=${SHARED:-false} domains=$domains"

  style:
    runs-on: macos-14
    needs: changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run pre-commit
        run: |
          python -m pip install pre-commit
          pre-commit run --all
          if ! git diff --quiet; then
            echo 'Style checks failed. Run: pre-commit run --all-files'
            exit 1
          fi

  core:
    runs-on: macos-14
    needs: [changes, style]
    if: needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install all deps
        run: pip install -e ".[all,dev]"

      - name: Test DSP imports without TTS/STT
        run: |
          python -c "from mlx_audio.dsp import stft, mel_filters; print('DSP OK')"
          python -c "from mlx_audio.utils import stft; import sys; assert 'mlx_audio.tts.utils' not in sys.modules; print('Lazy imports OK')"

      - name: Run core tests
        run: pytest -s mlx_audio/tests/

  modular:
    runs-on: macos-14
    needs: [changes, style]
    if: needs.changes.outputs.shared == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: stt
            verify: "from mlx_audio.stt.utils import load_model"
          - extra: tts
            verify: "from mlx_audio.tts.utils import load_model"
          - extra: sts
            verify: "from mlx_audio.sts.voice_pipeline import VoicePipeline"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install [${{ matrix.extra }}] only
        run: pip install -e ".[${{ matrix.extra }}]"

      - name: Verify ${{ matrix.extra }} imports
        run: python -c "${{ matrix.verify }}; print('${{ matrix.extra }} imports OK')"

  tests:
    runs-on: macos-14
    needs: [changes, style]
    if: needs.changes.outputs.domains != '[]'
    strategy:
      fail-fast: false
      matrix:
        domain: ${{ fromJSON(needs.changes.outputs.domains) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install all deps
        run: pip install -e ".[all,dev]"

      - name: Run ${{ matrix.domain }} tests
        run: pytest -s mlx_audio/${{ matrix.domain }}/tests/
